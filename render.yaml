services:
  - type: web
    name: riipen-companion
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    disk:
      name: riipen-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_PATH
        value: /var/data/riipen-companion.sqlite
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_ALERTS_CHANNEL_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
